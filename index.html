<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWLISH - Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="overlay" id="overlay"></div>
    
    <!-- Главная страница -->
    <div class="main-page" id="mainPage">
        <img class="text-white-bg" src="image/72.png" alt="White background" />
        <img class="logo" src="image/logo.png" alt="OWLISH Logo" />
        
        <div class="login-buttons">
            <a href="#" class="reg-btn" id="showSignup">Регистрация</a>
            <a href="#" class="login-btn" id="showLogin">Войти</a>
        </div>
        
        <h1 class="title">OWLISH</h1>
        
        <p class="description">Специализированная платформа для английского языка. Платформа создана для того чтобы сделать изучение и преподавание английского языка в колледже структурированным и комфортным для всех.</p>
    </div>
    
    <!-- Страница с формой регистрации/входа -->
    <div class="form-page" id="formPage">
        <button class="back-btn" id="backToMain">← Назад</button>
        
        <div class="withe">
            <img class="withe-bg" src="image/72.png" alt="White background" />
            
            <div class="form-container">
                <ul class="tab-group">
                    <li class="tab active" data-tab="signup"><a href="#">Регистрация</a></li>
                    <li class="tab" data-tab="login"><a href="#">Войти</a></li>
                </ul>
                
                <div class="tab-content">
                    <!-- Форма регистрации -->
                    <div id="signup" class="tab-pane active">
                        <h2>Создать аккаунт</h2>
                        <form action="/kataharina07@gmail.com" method="post">
                            <div class="top-row">
                                <div class="field-wrap">
                                    <input type="text" placeholder="Ваше ФИО" required autocomplete="off" />
                                </div>
                                
                                <div class="field-wrap">
                                    <input type="email" placeholder="example@mail.com" required autocomplete="off" />
                                </div>
                            </div>
                            
                            <div class="field-wrap">
                                <input type="password" name="password" placeholder="Введите пароль" required autocomplete="off" />
                            </div>
                            
                            <div class="field-wrap role-selection">
                                <div class="radio-group">
                                    <label class="radio-label">
                                        <input type="radio" name="role" value="student" onchange="toggleGroupField(this)" required /> Студент
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="role" value="teacher" onchange="toggleGroupField(this)" required /> Преподаватель
                                    </label>
                                </div>
                            </div>
                            
                            <div class="field-wrap group-field" id="groupField">
                                <input type="text" placeholder="Введите номер группы" id="groupInput" />
                            </div>
                            
                            <button type="submit" class="button">Зарегистрироваться</button>
                        </form>
                    </div>
                    
                    <!-- Форма входа -->
                    <div id="login" class="tab-pane">
                        <h2>Войти в аккаунт</h2>
                        <form action="/" method="post">
                            <div class="field-wrap">
                                <input type="email" placeholder="example@mail.com" required autocomplete="off" />
                            </div>
                            
                            <div class="field-wrap">
                                <input type="password" placeholder="Введите пароль" required autocomplete="off" />
                            </div>
                            
                            <p class="forgot"><a href="#">Забыли пароль?</a></p>
                            
                            <button type="submit" class="button">Войти</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script1.js"></script>
</body>
</html>
